services:
  # PostgreSQLデータベース
  postgres:
    image: postgres:15-alpine
    container_name: otto-postgres
    environment:
      POSTGRES_DB: ottodb
      POSTGRES_USER: ottouser
      POSTGRES_PASSWORD: ottopass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ottoproject-api/deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ottouser -d ottodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otto-network

  # Redisキャッシュ
  redis:
    image: redis:7-alpine
    container_name: otto-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otto-network

  # Vision API
  vision-api:
    build:
      context: ./ottoproject-api/services/vision-api
      dockerfile: Dockerfile
    container_name: otto-vision-api
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://ottouser:ottopass@postgres:5432/ottodb
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ottoproject-api/services/vision-api:/app
      - ./ottoproject-api/packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - otto-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Furniture API
  furniture-api:
    build:
      context: ./ottoproject-api/services/furniture-api
      dockerfile: Dockerfile
    container_name: otto-furniture-api
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://ottouser:ottopass@postgres:5432/ottodb
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ottoproject-api/services/furniture-api:/app
      - ./ottoproject-api/packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - otto-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Asset API (Hono)
  asset-api:
    build:
      context: ./ottoproject-api/services/asset-api
      dockerfile: Dockerfile
    container_name: otto-asset-api
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://ottouser:ottopass@postgres:5432/ottodb
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NODE_ENV=development
    volumes:
      - ./ottoproject-api/services/asset-api:/app
      - ./ottoproject-api/packages:/packages
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - otto-network
    command: bun run dev

  # Frontend (Next.js)
  frontend:
    build:
      context: ./ottoproject-frontend
      dockerfile: Dockerfile.dev
    container_name: otto-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - NODE_ENV=development
    volumes:
      - ./ottoproject-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - otto-network

volumes:
  postgres_data:
  redis_data:

networks:
  otto-network:
    driver: bridge