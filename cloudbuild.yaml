# Cloud Build設定
steps:
  # Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/furniture-detection-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/furniture-detection-api:latest'
      - '.'
    timeout: '1200s'

  # イメージをContainer Registryにプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/furniture-detection-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/furniture-detection-api:latest'

  # Cloud Runにデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'furniture-detection-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/furniture-detection-api:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '60'
      - '--concurrency'
      - '10'
      - '--max-instances'
      - '5'
      - '--allow-unauthenticated'

# ビルド結果のイメージ
images:
  - 'gcr.io/$PROJECT_ID/furniture-detection-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/furniture-detection-api:latest'

# タイムアウト設定
timeout: '1800s'